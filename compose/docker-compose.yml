# Base compose — use profiles via cofiswarm-launcher (no posix_spawn).
name: cofiswarm

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: cofiswarm-pgvector
    profiles: ["8gb", "16gb", "32gb"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: matrix
      POSTGRES_PASSWORD: matrix
      POSTGRES_DB: matrix_rag
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrix -d matrix_rag"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgvector_data:
