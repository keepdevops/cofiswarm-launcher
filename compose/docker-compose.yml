# Base compose — use profiles via cofiswarm-launcher (no posix_spawn).
name: cofiswarm

services:
  # The observer "middle man" — the always-on NATS broker every component connects to.
  nats:
    image: nats:2.10-alpine
    container_name: cofiswarm-nats
    profiles: ["8gb", "16gb", "32gb"]
    restart: unless-stopped
    command: ["-m", "8222"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring / healthz
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # RAG is serverless (sqlite-vec, a local .db file) — no database container.

  # ---- observer control plane (16gb/32gb). Build contexts are sibling repos under
  # ~/cofiswarm/repos; all wired to the nats broker. ----
  zmq-bridge:
    build: ../../cofiswarm-zmq-bridge
    container_name: cofiswarm-zmq-bridge
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      COFISWARM_BUS: nats
      COFISWARM_NATS_URL: nats://nats:4222
      COFISWARM_ZMQ_TOPICS: /etc/cofiswarm/topics.yaml
    volumes:
      - ../../cofiswarm-common/zmq/topics.yaml:/etc/cofiswarm/topics.yaml:ro
    ports:
      - "5555:5555"

  observer:
    build: ../../cofiswarm-observer
    container_name: cofiswarm-observer
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [zmq-bridge]
    environment:
      COFISWARM_BRIDGE_URL: http://zmq-bridge:5555
    ports:
      - "8016:8016"

  agent-registry:
    build: ../../cofiswarm-agent-registry
    container_name: cofiswarm-agent-registry
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [zmq-bridge]
    environment:
      COFISWARM_BRIDGE_URL: http://zmq-bridge:5555
      COFISWARM_SWARM_CONFIG: /etc/cofiswarm/swarm-config.json
      COFISWARM_AGENT_REGISTRY_STATE: /tmp/overrides.json
    volumes:
      - ../../cofiswarm-config/swarm-config.json:/etc/cofiswarm/swarm-config.json:ro
    ports:
      - "8012:8012"

  kvpool:
    build: ../../cofiswarm-kvpool
    container_name: cofiswarm-kvpool
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    environment:
      COFISWARM_KVPOOL_CONFIG: /etc/cofiswarm/kvpool.yaml
    volumes:
      - ../../cofiswarm-kvpool/configs/kvpool.yaml:/etc/cofiswarm/kvpool.yaml:ro
    ports:
      - "8014:8014"

  slot-manager:
    build: ../../cofiswarm-slot-manager
    container_name: cofiswarm-slot-manager
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [kvpool]
    environment:
      COFISWARM_SLOT_MANAGER_CONFIG: /etc/cofiswarm/endpoints.json
      COFISWARM_KVPOOL_URL: http://kvpool:8014
    volumes:
      - ../../cofiswarm-slot-manager/configs/endpoints.json:/etc/cofiswarm/endpoints.json:ro
    ports:
      - "8013:8013"

  dispatch:
    build: ../../cofiswarm-dispatch
    container_name: cofiswarm-dispatch
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [zmq-bridge, kvpool]
    environment:
      COFISWARM_BRIDGE_URL: http://zmq-bridge:5555
      COFISWARM_ROUTE_BUS: "1"
      COFISWARM_KVPOOL_URL: http://kvpool:8014
    ports:
      - "8010:8010"

  # ---- mode service as a bus participant: the flat mode + a responder that makes it
  # answerable on swarm.observer.mode.flat (the subject dispatch routes to). The same
  # pattern repeats for pipeline/cascade/router. ----
  mode-flat:
    build: ../../cofiswarm-mode-flat
    container_name: cofiswarm-mode-flat
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    command: ["-listen", ":8021"]
    environment:
      COFISWARM_MODE_CONFIG: /etc/cofiswarm/mode-flat.yaml
    volumes:
      - ../../cofiswarm-mode-flat/configs/mode-flat.yaml.example:/etc/cofiswarm/mode-flat.yaml:ro

  responder-flat:
    build:
      context: ../../cofiswarm-zmq-bridge
      dockerfile: Dockerfile.responder
    container_name: cofiswarm-responder-flat
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [nats, mode-flat]
    environment:
      COFISWARM_NATS_URL: nats://nats:4222
    command: ["-name", "flat", "-subject", "swarm.observer.mode.flat", "-backend", "http://mode-flat:8021/v1/execute"]

  mode-pipeline:
    build: ../../cofiswarm-mode-pipeline
    container_name: cofiswarm-mode-pipeline
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    command: ["-listen", ":8022"]
    environment:
      COFISWARM_MODE_CONFIG: /etc/cofiswarm/mode-pipeline.yaml
    volumes:
      - ../../cofiswarm-mode-pipeline/configs/mode-pipeline.yaml.example:/etc/cofiswarm/mode-pipeline.yaml:ro
  responder-pipeline:
    build:
      context: ../../cofiswarm-zmq-bridge
      dockerfile: Dockerfile.responder
    container_name: cofiswarm-responder-pipeline
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [nats, mode-pipeline]
    environment:
      COFISWARM_NATS_URL: nats://nats:4222
    command: ["-name", "pipeline", "-subject", "swarm.observer.mode.pipeline", "-backend", "http://mode-pipeline:8022/v1/execute"]

  mode-cascade:
    build: ../../cofiswarm-mode-cascade
    container_name: cofiswarm-mode-cascade
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    command: ["-listen", ":8023"]
    environment:
      COFISWARM_MODE_CONFIG: /etc/cofiswarm/mode-cascade.yaml
    volumes:
      - ../../cofiswarm-mode-cascade/configs/mode-cascade.yaml.example:/etc/cofiswarm/mode-cascade.yaml:ro
  responder-cascade:
    build:
      context: ../../cofiswarm-zmq-bridge
      dockerfile: Dockerfile.responder
    container_name: cofiswarm-responder-cascade
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [nats, mode-cascade]
    environment:
      COFISWARM_NATS_URL: nats://nats:4222
    command: ["-name", "cascade", "-subject", "swarm.observer.mode.cascade", "-backend", "http://mode-cascade:8023/v1/execute"]

  mode-router:
    build: ../../cofiswarm-mode-router
    container_name: cofiswarm-mode-router
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    command: ["-listen", ":8024"]
    environment:
      COFISWARM_MODE_CONFIG: /etc/cofiswarm/mode-router.yaml
    volumes:
      - ../../cofiswarm-mode-router/configs/mode-router.yaml.example:/etc/cofiswarm/mode-router.yaml:ro
  responder-router:
    build:
      context: ../../cofiswarm-zmq-bridge
      dockerfile: Dockerfile.responder
    container_name: cofiswarm-responder-router
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [nats, mode-router]
    environment:
      COFISWARM_NATS_URL: nats://nats:4222
    command: ["-name", "router", "-subject", "swarm.observer.mode.router", "-backend", "http://mode-router:8024/v1/execute"]

  # ---- infer/agents as bus participants: one responder per server_group, fronting the
  # host's llama/MLX server (Metal, outside compose) on swarm.observer.model.<group>.
  # host.docker.internal reaches the host; ports per slot-manager endpoints.json. ----
  responder-coder7b:
    build: { context: ../../cofiswarm-zmq-bridge, dockerfile: Dockerfile.responder }
    container_name: cofiswarm-responder-coder7b
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [nats]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      COFISWARM_NATS_URL: nats://nats:4222
    command: ["-name", "coder7b", "-subject", "swarm.observer.model.coder7b", "-backend", "http://host.docker.internal:8086/v1/chat/completions"]

  responder-llama8b:
    build: { context: ../../cofiswarm-zmq-bridge, dockerfile: Dockerfile.responder }
    container_name: cofiswarm-responder-llama8b
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [nats]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      COFISWARM_NATS_URL: nats://nats:4222
    command: ["-name", "llama8b", "-subject", "swarm.observer.model.llama8b", "-backend", "http://host.docker.internal:8085/v1/chat/completions"]

  responder-gemma9b:
    build: { context: ../../cofiswarm-zmq-bridge, dockerfile: Dockerfile.responder }
    container_name: cofiswarm-responder-gemma9b
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [nats]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      COFISWARM_NATS_URL: nats://nats:4222
    command: ["-name", "gemma9b", "-subject", "swarm.observer.model.gemma9b", "-backend", "http://host.docker.internal:8084/v1/chat/completions"]

  responder-gemma2b:
    build: { context: ../../cofiswarm-zmq-bridge, dockerfile: Dockerfile.responder }
    container_name: cofiswarm-responder-gemma2b
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [nats]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      COFISWARM_NATS_URL: nats://nats:4222
    command: ["-name", "gemma2b", "-subject", "swarm.observer.model.gemma2b", "-backend", "http://host.docker.internal:8087/v1/chat/completions"]

  responder-mlx1b:
    build: { context: ../../cofiswarm-zmq-bridge, dockerfile: Dockerfile.responder }
    container_name: cofiswarm-responder-mlx1b
    profiles: ["16gb", "32gb"]
    restart: unless-stopped
    depends_on: [nats]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      COFISWARM_NATS_URL: nats://nats:4222
    command: ["-name", "mlx1b", "-subject", "swarm.observer.model.mlx1b", "-backend", "http://host.docker.internal:8083/v1/chat/completions"]
